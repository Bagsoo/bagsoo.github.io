<!DOCTYPE html>
<html lang="ko">
<head>

<style>
  body {

    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;

    color: #f1f5f9;
    display: flex;
    align-items: center;
    justify-content: center;

  p {

  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  a.btn {
    display: inline-block;

    text-decoration: none;

  a.primary {
    background: #4f46e5;
    color: #ffffff;
